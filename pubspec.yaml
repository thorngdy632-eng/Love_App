name: love_app
description: "ភពមួយពីរនាក់ - Private couple relationship app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  flutter_map_marker_cluster: ^1.3.6

  # UI / UX
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  intl: ^0.20.2
  timeago: ^3.7.0
  lottie: ^3.1.3
  photo_view: ^0.15.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.2.0

  # State / Utils
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Map tile caching
  flutter_map_cancellable_tile_provider: ^3.0.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: "web/icon.png"
    favicon: true
  image_path: "web/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFF5F8"
  adaptive_icon_foreground: "web/icon.png"

flutter:
  uses-material-design: true

  fonts:
    - family: KantumruyPro
      fonts:
        - asset: assets/fonts/KantumruyPro-Regular.ttf
          weight: 400

  assets:
    - assets/images/
    - assets/fonts/
